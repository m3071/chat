name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r apps/api/requirements.txt
      - name: Python dependency audit
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r apps/api/requirements.txt
      - name: Compile backend
        run: python -m compileall apps/api/app
      - name: Run backend tests
        run: python -m pytest tests -q -p no:cacheprovider

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
      - name: Type check
        working-directory: apps/web
        run: npm run lint
      - name: Security audit
        working-directory: apps/web
        run: npm audit --audit-level=high
      - name: Build frontend
        working-directory: apps/web
        run: npm run build -- --webpack

  docker-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t cyberred-api:ci .
      - name: Build Web image
        run: docker build -f infra/docker/web.Dockerfile -t cyberred-web:ci .
      - name: Scan API image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cyberred-api:ci
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload API scan
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
      - name: Scan Web image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cyberred-web:ci
          format: sarif
          output: trivy-web.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload Web scan
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-web.sarif

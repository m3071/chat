name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build CyberRed EXE
        shell: cmd
        run: build-exe.bat
      - name: Optional code signing
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        shell: powershell
        run: |
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}"))
          & signtool sign /f $certPath /p "${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist\CyberRed\CyberRed.exe
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: cmd
        run: build-installer.bat
      - name: Optional installer signing
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        shell: powershell
        run: |
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          if (-not (Test-Path $certPath)) {
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}"))
          }
          & signtool sign /f $certPath /p "${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist\CyberRedSetup.exe
      - name: Create archive
        shell: powershell
        env:
          HAS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        run: |
          Compress-Archive -Path dist\CyberRed\* -DestinationPath dist\CyberRed-windows.zip -Force
          $files = @("dist\CyberRed-windows.zip", "dist\CyberRedSetup.exe")
          $manifest = @()
          foreach ($file in $files) {
            $hash = Get-FileHash $file -Algorithm SHA256
            $manifest += [pscustomobject]@{
              file = Split-Path $file -Leaf
              sha256 = $hash.Hash
              bytes = (Get-Item $file).Length
              signed = $env:HAS_SIGNING_CERT -eq "true"
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Out-File dist\CyberRed-release-manifest.json -Encoding utf8
          Get-FileHash dist\CyberRed-windows.zip,dist\CyberRedSetup.exe -Algorithm SHA256 | Format-Table -AutoSize | Out-File dist\CyberRed-windows.sha256.txt
      - uses: actions/upload-artifact@v5
        with:
          name: CyberRed-windows
          path: |
            dist/CyberRed-windows.zip
            dist/CyberRedSetup.exe
            dist/CyberRed-windows.sha256.txt
            dist/CyberRed-release-manifest.json
